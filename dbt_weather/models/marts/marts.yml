version: 2

models:
  - name: dim_city
    columns:
      - name: city_id
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: fct_weather_hourly
    columns:
      - name: weather_key
        tests:
          - unique
          - not_null
      - name: city_id
        tests:
          - not_null
          - relationships:
              to: ref('dim_city')
              field: city_id
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key