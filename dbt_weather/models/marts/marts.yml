version: 2

models:
  - name: dim_city
    columns:
      - name: city_id
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: fct_weather_hourly
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "temperature_c > -80 and temperature_c < 60"

    columns:
      - name: weather_key
        tests:
          - unique
          - not_null

      - name: city_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_city')
                field: city_id

      - name: date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      - name: precipitation_mm
        tests:
          - not_null

      - name: relative_humidity_pct
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100