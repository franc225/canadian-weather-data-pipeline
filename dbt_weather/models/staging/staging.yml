version: 2

sources:
  - name: raw
    schema: main
    tables:
      - name: raw_weather
        description: "Raw hourly weather data loaded from Parquet into DuckDB."

models:
  - name: stg_weather_hourly
    description: "Cleaned hourly weather data."
    columns:
      - name: weather_key
        tests:
          - unique
          - not_null
      - name: city
        tests:
          - not_null
      - name: observed_at
        tests:
          - not_null